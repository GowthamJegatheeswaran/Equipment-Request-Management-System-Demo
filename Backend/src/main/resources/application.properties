# Application
app.mail.from-name=ERMS
app.mail.from=jppj5631@gmail.com
server.port=8080

# MySQL Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000

# Spring Security
spring.security.user.name=disabled
spring.security.user.password=disabled

# Brevo HTTP API (no SMTP — works on Railway)
brevo.api.key=${BREVO_API_KEY}

# Disable Spring Mail auto-configuration (we use Brevo HTTP API directly)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

# Frontend URL
app.frontend.base-url=${APP_FRONTEND_BASE_URL}

# Logging
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE