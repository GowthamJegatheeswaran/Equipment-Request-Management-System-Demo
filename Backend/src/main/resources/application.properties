# ── Application ───────────────────────────────────────────────────────────────
server.port=8080

# ── MySQL Database ─────────────────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ────────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000

# ── Spring Security ────────────────────────────────────────────────────────────
spring.security.user.name=disabled
spring.security.user.password=disabled

# ── Email (Gmail SMTP) ─────────────────────────────────────────────────────────
#
# REQUIRED Railway environment variables:
#   SPRING_MAIL_USERNAME  = jegatheeswarangowtham@gmail.com
#   SPRING_MAIL_PASSWORD  = <16-char Gmail App Password>
#     (Google Account → Security → 2-Step Verification → App Passwords)
#
# FIX: app.mail.from now reads from SPRING_MAIL_USERNAME env var.
#   The old value was hardcoded to jegatheeswarangowtham@gmail.com.
#   If SPRING_MAIL_USERNAME was a different address, Gmail would reject
#   the FROM mismatch → MailSendException → 500.
#   Using the same env var keeps the authenticated address and FROM in sync.
#
app.mail.from=${SPRING_MAIL_USERNAME}
app.mail.from-name=Equipment Request System

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# FIX: Increased SMTP timeouts from 1500ms → 15000ms (15 seconds).
#   Gmail SMTP TLS handshake + auth on a cold Railway container can take
#   3-8 seconds. At 1500ms the connection times out before the handshake
#   completes → SocketTimeoutException → MailSendException → 500 "Server error".
#   15 seconds is the industry standard for transactional SMTP.
#
spring.mail.properties.mail.smtp.connectiontimeout=15000
spring.mail.properties.mail.smtp.timeout=15000
spring.mail.properties.mail.smtp.writetimeout=15000

# ── Frontend URL (for reset/verify email links) ────────────────────────────────
#
# REQUIRED Railway environment variable:
#   APP_FRONTEND_BASE_URL = https://equipment-request-frontend-production.up.railway.app
#
app.frontend.base-url=${APP_FRONTEND_BASE_URL}

# ── Logging ────────────────────────────────────────────────────────────────────
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
spring.mail.properties.mail.debug=true
logging.level.org.springframework.mail=DEBUG
logging.level.org.springframework.mail.javamail=DEBUG
logging.level.jakarta.mail=DEBUG