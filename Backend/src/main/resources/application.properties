# Application
app.mail.from-name=Equipment Request System
app.mail.from=jegatheeswarangowtham@gmail.com
server.port=8080
 
# MySQL Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
 
# JWT Configuration
 
app.jwt.secret=uoj-equipment-request-system-secret-key-2025
app.jwt.expiration=86400000
 
 
# Spring Security
 
spring.security.user.name=disabled
spring.security.user.password=disabled
 
 
# Email (SMTP) Configuration
# Resend Email API
 
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
 
spring.mail.properties.mail.smtp.ssl.trust=smtp-relay.brevo.com
 
# Frontend URL (Password Reset)
 
app.frontend.base-url=http://localhost:5173
 
# Logging
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
spring.mail.properties.mail.debug=true
logging.level.org.springframework.mail=DEBUG
logging.level.org.springframework.mail.javamail=DEBUG
logging.level.jakarta.mail=DEBUG
 
 
 
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000